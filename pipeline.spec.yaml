meta:
  profile: default
  theme: dark
  layout: horizontal
  canvas: 1800x950
  title: Huawei VRP Log Processing Pipeline
  description: '4-phase flowchart: logs/*.txt → segments → groups → PNG screenshots → Word/Excel insert'
modules:
  - id: phase1
    label: PHASE 1 — PARSE
    style:
      fillColor: '#1a1a2e'
      strokeColor: '#e94560'
      strokeWidth: 2
      labelFontColor: '#e94560'
      labelFontWeight: 700
  - id: phase2
    label: PHASE 2 — GROUP
    style:
      fillColor: '#16213e'
      strokeColor: '#0f3460'
      strokeWidth: 2
      labelFontColor: '#0f3460'
      labelFontWeight: 700
  - id: phase3
    label: PHASE 3 — RENDER
    style:
      fillColor: '#0f3460'
      strokeColor: '#533483'
      strokeWidth: 2
      labelFontColor: '#533483'
      labelFontWeight: 700
  - id: phase4
    label: PHASE 4 — INSERT
    style:
      fillColor: '#533483'
      strokeColor: '#e94560'
      strokeWidth: 2
      labelFontColor: '#e94560'
      labelFontWeight: 700
nodes:
  - id: p1-start
    label: logs/*.txt
    type: terminal
    module: phase1
    size: medium
    position:
      x: 226
      'y': 80
    style:
      fillColor: '#1a1a2e'
      strokeColor: '#e94560'
      fontColor: '#f1f5f9'
      strokeWidth: 2
  - id: p1-has-prompt
    label: |-
      Has Router
      prompt?
    type: decision
    module: phase1
    size: medium
    position:
      x: 226
      'y': 200
    style:
      fillColor: '#1a1a2e'
      strokeColor: '#e94560'
      fontColor: '#f1f5f9'
      strokeWidth: 2
  - id: p1-skip
    label: Skip
    type: terminal
    module: phase1
    size: small
    position:
      x: 360
      'y': 200
    style:
      fillColor: '#1a1a2e'
      strokeColor: '#e94560'
      fontColor: '#f1f5f9'
      strokeWidth: 1
  - id: p1-split
    label: |-
      Split into
      segments
    type: process
    module: phase1
    size: medium
    position:
      x: 226
      'y': 320
    style:
      fillColor: '#1a1a2e'
      strokeColor: '#e94560'
      fontColor: '#f1f5f9'
      strokeWidth: 2
  - id: p1-output
    label: |-
      segments list
      [{prompt, cmd, output}]
    type: document
    module: phase1
    size: large
    position:
      x: 226
      'y': 450
    style:
      fillColor: '#1a1a2e'
      strokeColor: '#e94560'
      fontColor: '#f1f5f9'
      strokeWidth: 2
  - id: p2-deeper
    label: |-
      Command goes
      deeper?
    type: decision
    module: phase2
    size: medium
    position:
      x: 646
      'y': 200
    style:
      fillColor: '#16213e'
      strokeColor: '#0f3460'
      fontColor: '#f1f5f9'
      strokeWidth: 2
  - id: p2-standalone
    label: |-
      Standalone
      (1 cmd → 1 PNG)
    type: process
    module: phase2
    size: medium
    position:
      x: 780
      'y': 200
    style:
      fillColor: '#16213e'
      strokeColor: '#0f3460'
      fontColor: '#f1f5f9'
      strokeWidth: 2
  - id: p2-nested
    label: |-
      Nested block
      (all cmds → 1 PNG)
