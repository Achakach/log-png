# Cisco Switches Inventory
# Add your switch IP addresses or hostnames below

[cisco_switches]
# switch1 ansible_host=192.168.1.1 ansible_user=admin ansible_password=your_password
# switch2 ansible_host=192.168.1.2 ansible_user=admin ansible_password=your_password

[cisco_switches:vars]
